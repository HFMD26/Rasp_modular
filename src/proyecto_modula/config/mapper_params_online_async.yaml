slam_toolbox:
  ros__parameters:
    # --- Parámetros de Frames y Tópicos ---
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_sim_time: false
    mode: mapping # Cambia a localization si ya tienes un mapa

    # --- Solución al error de Cola Llena (Queue Full) ---
    # Aumentamos el buffer para que no tire mensajes si hay lag
    scan_buffer_size: 50
    scan_buffer_maximum_scan_distance: 10.0
    
    # --- Solución al Delay de 240s / 500s ---
    # Le damos más tiempo al sistema para que espere las TFs
    transform_timeout: 1.5 
    tf_buffer_duration: 30.0

    # --- Optimización para Raspberry Pi ---
    # Procesamos menos escaneos para no saturar la CPU
    minimum_time_between_scans: 0.2
    map_update_interval: 2.0
    resolution: 0.05 # Precisión de 5cm por píxel
    
    # --- Ajustes de Movimiento ---
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
