slam_toolbox:
  ros__parameters:
    # --- Parámetros de Frames y Tópicos ---
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_sim_time: false
    mode: mapping 

    # --- Solución al error de Cola Llena y Estabilidad ---
    scan_buffer_size: 15
    scan_buffer_maximum_scan_distance: 5.0 # Reducido a 8m para mayor limpieza
    transform_timeout: 0.5 
    tf_buffer_duration: 20.0 # Aumentado para dar margen a la Raspberry

    # --- Optimización para Raspberry Pi ---
    minimum_time_between_scans: 0.2 # Procesamos 5 escaneos por segundo (más ligero)
    map_update_interval: 2.0 # Actualiza el mapa cada 2 segundos para ahorrar CPU
    resolution: 0.05 
    
    # --- Ajustes de Movimiento (Clave para evitar "ruido" al estar quieto) ---
    minimum_travel_distance: 0.3 # No mapea si no se mueve 30cm
    minimum_travel_heading: 0.3 # No mapea si no gira 0.3 rad

    # --- Parámetros de Correlación (Para paredes rectas y limpias) ---
    # Aumentamos los umbrales de confianza
    minimum_score: 0.1         # Score mínimo para aceptar un escaneo
    link_match_minimum_response_fine: 0.1 
    
    # --- Rango del Láser ---
    max_laser_range: 5.0       # Ignora lecturas ruidosas de muy lejos
    min_laser_range: 0.2       # Ignora el propio cuerpo del robotg: 0.2
